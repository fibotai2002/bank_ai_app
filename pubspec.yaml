name: bank_ai_app
description: Markaziy Bank AI Agent
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  file_picker: ^8.0.0+1
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  badges: ^3.1.2
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  open_file: ^3.3.2
  shimmer: ^3.0.0
  web_socket_channel: ^3.0.1
  fl_chart: ^0.66.0
  record: ^5.1.0
  audioplayers: ^6.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A1628"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: false
